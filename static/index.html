<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hydra</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav>
    <span class="logo">Hydra</span>
    <a href="/static/index.html" class="active">Sessions</a>
    <a href="/static/triage.html">Triage</a>
    <a href="#" onclick="showMetrics(); return false;">Metrics</a>
  </nav>

  <div class="layout">
    <!-- Sidebar: New Session form -->
    <div class="sidebar">
      <div class="section-title">New Session</div>
      <form onsubmit="createSession(event)">
        <div class="form-group">
          <label>Repository</label>
          <input type="url" id="repo_url" required placeholder="https://github.com/owner/repo">
        </div>
        <div class="form-group">
          <label>Task Description</label>
          <textarea id="task_description" required placeholder="Describe what needs to be done..."></textarea>
        </div>
        <div class="form-group">
          <label>Issue #</label>
          <input type="number" id="issue_number" placeholder="42" oninput="previewIssue()">
        </div>
        <div id="issue-preview" style="display:none;margin-bottom:12px;color:var(--text-secondary);font-size:12px"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div class="form-group">
            <label>Type</label>
            <select id="issue_type">
              <option value="">Auto</option>
              <option value="bug">Bug</option>
              <option value="feature">Feature</option>
            </select>
          </div>
          <div class="form-group">
            <label>Max Iter</label>
            <input type="number" id="max_iterations" value="3" min="1" max="10">
          </div>
        </div>
        <button type="submit" style="width:100%">Create Session</button>
      </form>
    </div>

    <!-- Main content: Session list -->
    <div class="main-content">
      <div id="metrics-panel" style="display:none"></div>

      <div class="filter-tabs">
        <button class="active" onclick="filterSessions('all', this)">All</button>
        <button onclick="filterSessions('running', this)">Running</button>
        <button onclick="filterSessions('needs_human', this)">Needs Human</button>
        <button onclick="filterSessions('pr_review', this)">PR Review</button>
        <button onclick="filterSessions('completed', this)">Completed</button>
        <button onclick="filterSessions('failed', this)">Failed</button>
      </div>

      <div class="session-list" id="session-list"></div>
    </div>
  </div>

  <script src="/static/app.js?v=8"></script>
  <script>loadSessions(); showMetrics();</script>
</body>
</html>
